<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MeoDen · Key</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      background: #faf6f0;
      color: #2c2c2c;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      padding: 20px;
    }
    .container {
      background: #ffffff;
      padding: 50px 40px;
      border-radius: 48px;
      max-width: 560px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.04);
      text-align: center;
      border: 1px solid rgba(255,182,193,0.2);
    }
    h1 {
      font-size: 1.8rem;
      font-weight: 300;
      letter-spacing: 3px;
      margin-bottom: 6px;
    }
    h1 span { color: #e8808a; font-weight: 600; }
    .key-display {
      background: #f8f4f0;
      padding: 28px 20px;
      border-radius: 32px;
      font-size: 2.4rem;
      font-weight: 300;
      letter-spacing: 8px;
      color: #2c2c2c;
      word-break: break-all;
      border: 1px solid #eeeae6;
      margin: 25px 0 20px;
      font-family: 'Courier New', monospace;
    }
    .btn {
      background: #2c2c2c;
      color: #fff;
      border: none;
      padding: 14px 40px;
      border-radius: 40px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: 0.25s;
      letter-spacing: 1px;
    }
    .btn:hover {
      background: #e8808a;
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(232,128,138,0.2);
    }
    .toast {
      visibility: hidden;
      background: #e8808a;
      color: #fff;
      padding: 6px 20px;
      border-radius: 40px;
      font-size: 0.85rem;
      margin-top: 16px;
      display: inline-block;
      transition: 0.25s;
      opacity: 0;
    }
    .toast.show { visibility: visible; opacity: 1; }
    .back {
      margin-top: 28px;
      display: inline-block;
      color: #b0aba6;
      text-decoration: none;
      font-size: 0.85rem;
      transition: color 0.2s;
      letter-spacing: 1px;
    }
    .back:hover { color: #e8808a; }
  </style>
</head>
<body>
<div class="container" id="app"></div>

<script>
  const app = document.getElementById('app');

  function showKey(key) {
    app.innerHTML = `
      <h1>🔑 Meo<span>Den</span></h1>
      <div class="key-display">${key}</div>
      <button class="btn" onclick="copyKey('${key}')">📋 Sao chép</button>
      <div id="toast" class="toast">✅ Đã sao chép</div>
      <a class="back" href="/">← Về trang chủ</a>
    `;
  }

  window.copyKey = function(key) {
    navigator.clipboard.writeText(key).then(() => {
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }).catch(() => {
      // Fallback
      const ta = document.createElement('textarea');
      ta.value = key;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      ta.remove();
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    });
  };

  const path = window.location.pathname;
  if (path.startsWith('/key/')) {
    const key = path.substring(5);
    if (key) {
      showKey(key);
    } else {
      window.location.href = '/';
    }
  } else {
    window.location.href = '/';
  }
</script>
</body>
</html>
