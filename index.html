<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MeoDen Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0b0b1a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      padding: 20px;
    }
    .container {
      background: #1a1a3e;
      padding: 50px 40px;
      border-radius: 32px;
      max-width: 700px;
      width: 100%;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.8);
      text-align: center;
      border: 1px solid #3a3a7a;
    }
    h1 {
      font-size: 3rem;
      color: #ff6b9d;
      margin-bottom: 8px;
      text-shadow: 0 0 30px rgba(255, 107, 157, 0.3);
    }
    .sub {
      font-size: 1.1rem;
      color: #bbb;
      margin-bottom: 25px;
    }
    .social {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin: 20px 0 30px;
      flex-wrap: wrap;
    }
    .social a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #2a2a5a;
      padding: 12px 28px;
      border-radius: 40px;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      font-size: 1.1rem;
      transition: 0.25s;
      border: 1px solid #3a3a7a;
    }
    .social a:hover {
      background: #ff6b9d;
      border-color: #ff6b9d;
      transform: scale(1.05);
      box-shadow: 0 0 25px rgba(255, 107, 157, 0.4);
    }
    .input-group {
      display: flex;
      gap: 12px;
      margin-top: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .input-group input {
      flex: 1;
      min-width: 200px;
      padding: 14px 20px;
      border-radius: 40px;
      border: none;
      background: #2a2a5a;
      color: #fff;
      font-size: 1rem;
    }
    .input-group input::placeholder {
      color: #888;
    }
    .btn {
      background: #ff6b9d;
      color: #fff;
      border: none;
      padding: 14px 34px;
      border-radius: 40px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: 0.25s;
      box-shadow: 0 0 15px rgba(255, 107, 157, 0.3);
    }
    .btn:hover {
      background: #ff3b7a;
      transform: scale(1.04);
      box-shadow: 0 0 30px rgba(255, 107, 157, 0.6);
    }
    .hint {
      margin-top: 20px;
      font-size: 0.9rem;
      color: #888;
    }
    .hint code {
      background: #2a2a5a;
      padding: 4px 12px;
      border-radius: 8px;
      color: #ffd700;
    }
    .footer {
      margin-top: 30px;
      font-size: 0.8rem;
      color: #444;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🐾 MeoDen</h1>
    <p class="sub">Hệ thống Key &amp; Dịch vụ</p>

    <div class="social">
      <a href="https://dsc.gg/meoden" target="_blank">💬 Discord</a>
      <a href="https://www.tiktok.com/@meoden210.69" target="_blank">📱 TikTok</a>
    </div>

    <div class="input-group">
      <input type="text" id="keyInput" placeholder="Nhập key bất kỳ..." />
      <button class="btn" onclick="goKey()">🔑 Mở</button>
    </div>
    <p class="hint">
      Hoặc truy cập trực tiếp: <code>/key/&lt;key&gt;</code>
    </p>
    <div class="footer">Made with ❤️ by MeoDen</div>
  </div>

  <script>
    function goKey() {
      const key = document.getElementById('keyInput').value.trim();
      if (key) {
        window.location.href = `/key/${key}`;
      }
    }

    // Nếu người dùng nhấn Enter
    document.getElementById('keyInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') goKey();
    });
  </script>
</body>
</html>
